<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lingua">
<meta name="theme-color" content="#f8f7f4">
<title>Lingua — Mon Anglais</title>
<link rel="manifest" href="manifest.json">
<style>
:root{
  --bg:#f8f7f4;--surf:#fff;--surf2:#f1f0ed;
  --bord:rgba(0,0,0,0.08);--bord2:rgba(0,0,0,0.14);
  --txt:#1a1a1a;--txt2:#555;--txt3:#999;
  --acc:#0ea5e9;--acc-dim:#e0f2fe;--acc-txt:#0369a1;
  --grn:#16a34a;--grn-dim:#dcfce7;--grn-txt:#15803d;
  --red:#dc2626;--red-dim:#fee2e2;--red-txt:#b91c1c;
  --amb:#d97706;--amb-dim:#fef3c7;
  --r:12px;--rs:8px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overscroll-behavior:none;}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;}
#screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:calc(var(--safe-top)+16px) 16px 16px;}
#nav{display:flex;background:var(--surf);border-top:1px solid var(--bord);padding:6px 0 calc(var(--safe-bot)+6px);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;color:var(--txt3);font-size:10px;padding:4px 0;transition:color .15s;}
.nav-btn.active{color:var(--acc);}
.nav-btn svg{width:22px;height:22px;}

/* Cards */
.card{background:var(--surf);border-radius:var(--r);border:1px solid var(--bord);padding:16px;margin-bottom:12px;}
.card-sm{padding:12px;}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:var(--rs);border:none;cursor:pointer;font-size:14px;font-weight:500;transition:opacity .15s;}
.btn:active{opacity:.7;}
.btn-primary{background:var(--acc);color:#fff;}
.btn-ghost{background:var(--surf2);color:var(--txt);}
.btn-danger{background:var(--red-dim);color:var(--red-txt);}
.btn-success{background:var(--grn-dim);color:var(--grn-txt);}
.btn-full{width:100%;justify-content:center;}
.btn-sm{padding:6px 12px;font-size:13px;}

/* Inputs */
input,textarea,select{width:100%;padding:10px 12px;border:1px solid var(--bord2);border-radius:var(--rs);font-size:15px;background:var(--surf);color:var(--txt);outline:none;font-family:inherit;}
input:focus,textarea:focus,select:focus{border-color:var(--acc);}
textarea{resize:none;min-height:80px;}
label{display:block;font-size:13px;font-weight:500;color:var(--txt2);margin-bottom:6px;}
.field{margin-bottom:14px;}

/* Tags */
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;}
.tag-naval{background:var(--acc-dim);color:var(--acc-txt);}
.tag-general{background:var(--surf2);color:var(--txt2);}
.tag-mastered{background:var(--grn-dim);color:var(--grn-txt);}

/* Word list */
.word-item{display:flex;align-items:center;gap:10px;padding:12px;background:var(--surf);border-radius:var(--rs);border:1px solid var(--bord);margin-bottom:8px;cursor:pointer;transition:border-color .15s;}
.word-item:active{border-color:var(--acc);}
.word-main{flex:1;}
.word-en{font-size:15px;font-weight:600;}
.word-fr{font-size:13px;color:var(--txt2);margin-top:2px;}
.word-check{color:var(--grn);font-size:18px;}

/* Search */
.search-wrap{position:relative;margin-bottom:14px;}
.search-wrap input{padding-left:36px;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txt3);}

/* Flash card */
#flash-card{background:var(--surf);border-radius:16px;border:1px solid var(--bord);padding:40px 24px;text-align:center;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:16px;cursor:pointer;}
.flash-word{font-size:28px;font-weight:700;margin-bottom:8px;}
.flash-hint{font-size:13px;color:var(--txt3);}
.flash-answer{font-size:20px;color:var(--txt2);margin-top:16px;padding-top:16px;border-top:1px solid var(--bord);}
.flash-actions{display:flex;gap:10px;}
.flash-actions .btn{flex:1;justify-content:center;}

/* Stats */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bord);}
.stat-row:last-child{border-bottom:none;}
.stat-val{font-size:20px;font-weight:700;color:var(--acc);}
.progress-bar{height:8px;background:var(--surf2);border-radius:4px;overflow:hidden;margin-top:8px;}
.progress-fill{height:100%;background:var(--grn);border-radius:4px;transition:width .4s;}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:flex-end;}
.modal-bg.open{display:flex;}
.modal{background:var(--surf);border-radius:20px 20px 0 0;padding:24px 20px calc(var(--safe-bot)+24px);width:100%;max-width:480px;margin:0 auto;max-height:85vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:var(--bord2);border-radius:2px;margin:0 auto 20px;}

/* Toast */
#toast{position:fixed;bottom:calc(var(--safe-bot)+80px);left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:20px;font-size:14px;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:200;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Loader */
.loader{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--txt3);font-size:14px;gap:10px;}
.spin{width:20px;height:20px;border:2px solid var(--bord2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

.empty{text-align:center;padding:40px 20px;color:var(--txt3);font-size:14px;}
.section-title{font-size:12px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
</style>
</head>
<body>
<div id="app">
  <div id="screen"></div>
  <nav id="nav">
    <button class="nav-btn active" onclick="switchTab('glossary')" id="nav-glossary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Glossaire
    </button>
    <button class="nav-btn" onclick="switchTab('flash')" id="nav-flash">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      Révision
    </button>
    <button class="nav-btn" onclick="switchTab('add')" id="nav-add">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Ajouter
    </button>
    <button class="nav-btn" onclick="switchTab('stats')" id="nav-stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Stats
    </button>
  </nav>
</div>

<div id="modal-word" class="modal-bg" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const WORKER_URL = 'https://wispy-sky-da60.alexandrebothereau.workers.dev';

// ─── STATE ───────────────────────────────────────────────────────────────────
let words = [];
let currentTab = 'glossary';
let flashList = [];
let flashIdx = 0;
let flashRevealed = false;
let filterCat = 'all';
let filterMastered = 'all';
let searchQ = '';

// ─── API ─────────────────────────────────────────────────────────────────────
async function apiGet() {
  const r = await fetch(`${WORKER_URL}/words`);
  const d = await r.json();
  return d.words || [];
}

async function apiAdd(word) {
  const r = await fetch(`${WORKER_URL}/words`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(word)
  });
  return r.json();
}

async function apiMastered(id, mastered) {
  const r = await fetch(`${WORKER_URL}/words/${id}/mastered`, {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({mastered})
  });
  return r.json();
}

// ─── LOAD ─────────────────────────────────────────────────────────────────────
async function loadWords() {
  renderGlossaryLoading();
  try {
    words = await apiGet();
    renderTab();
  } catch(e) {
    document.getElementById('screen').innerHTML = `<div class="empty">❌ Erreur de connexion au serveur.<br><br><button class="btn btn-primary" onclick="loadWords()">Réessayer</button></div>`;
  }
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  ['glossary','flash','add','stats'].forEach(t => {
    document.getElementById(`nav-${t}`).classList.toggle('active', t === tab);
  });
  if (tab === 'flash') resetFlash();
  renderTab();
}

function renderTab() {
  switch(currentTab) {
    case 'glossary': renderGlossary(); break;
    case 'flash':    renderFlash();    break;
    case 'add':      renderAdd();      break;
    case 'stats':    renderStats();    break;
  }
}

// ─── GLOSSARY ─────────────────────────────────────────────────────────────────
function renderGlossaryLoading() {
  document.getElementById('screen').innerHTML = `<div class="loader"><div class="spin"></div>Chargement depuis Notion…</div>`;
}

function renderGlossary() {
  let filtered = words.filter(w => {
    const q = searchQ.toLowerCase();
    const matchQ = !q || w.word.toLowerCase().includes(q) || (w.example||'').toLowerCase().includes(q);
    const matchCat = filterCat === 'all' || (w.category||'').toLowerCase() === filterCat.toLowerCase();
    const matchM = filterMastered === 'all' || (filterMastered === 'yes' ? w.mastered : !w.mastered);
    return matchQ && matchCat && matchM;
  });

  const cats = [...new Set(words.map(w => w.category).filter(Boolean))].sort();

  document.getElementById('screen').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div>
        <div style="font-size:20px;font-weight:700">Glossaire</div>
        <div style="font-size:13px;color:var(--txt3)">${filtered.length} / ${words.length} mots</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="loadWords()">↻ Sync</button>
    </div>

    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" placeholder="Rechercher…" value="${searchQ}" oninput="searchQ=this.value;renderGlossary()">
    </div>

    <div style="display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px">
      <button class="btn btn-sm ${filterMastered==='all'?'btn-primary':'btn-ghost'}" onclick="filterMastered='all';renderGlossary()">Tous</button>
      <button class="btn btn-sm ${filterMastered==='no'?'btn-primary':'btn-ghost'}" onclick="filterMastered='no';renderGlossary()">À réviser</button>
      <button class="btn btn-sm ${filterMastered==='yes'?'btn-primary':'btn-ghost'}" onclick="filterMastered='yes';renderGlossary()">Maîtrisés</button>
      ${cats.map(c => `<button class="btn btn-sm ${filterCat===c?'btn-primary':'btn-ghost'}" onclick="filterCat=filterCat==='${c}'?'all':'${c}';renderGlossary()">${c}</button>`).join('')}
    </div>

    ${filtered.length === 0 ? '<div class="empty">Aucun mot trouvé</div>' :
      filtered.map(w => `
        <div class="word-item" onclick="openWord('${w.id}')">
          <div class="word-main">
            <div class="word-en">${w.word}</div>
            ${w.example ? `<div class="word-fr">${w.example}</div>` : ''}
            ${w.category ? `<span class="tag tag-${w.category==='Naval'?'naval':'general'}" style="margin-top:4px;display:inline-block">${w.category}</span>` : ''}
          </div>
          ${w.mastered ? '<span class="word-check">✓</span>' : ''}
        </div>
      `).join('')}
  `;
}

function openWord(id) {
  const w = words.find(x => x.id === id);
  if (!w) return;
  document.getElementById('modal-content').innerHTML = `
    <div style="font-size:24px;font-weight:700;margin-bottom:6px">${w.word}</div>
    ${w.category ? `<span class="tag tag-${w.category==='Naval'?'naval':'general'}">${w.category}</span>` : ''}
    ${w.example ? `<div style="margin-top:16px"><div class="section-title">Exemple / Contexte</div><div style="font-size:15px;color:var(--txt2)">${w.example}</div></div>` : ''}
    <div style="margin-top:16px;display:flex;gap:8px">
      <button class="btn ${w.mastered?'btn-ghost':'btn-success'} btn-sm" onclick="toggleMastered('${w.id}')">
        ${w.mastered ? '↩ Remettre à réviser' : '✓ Marquer maîtrisé'}
      </button>
    </div>
    <div style="margin-top:10px">
      <button class="btn btn-ghost btn-sm btn-full" onclick="closeModal()">Fermer</button>
    </div>
  `;
  document.getElementById('modal-word').classList.add('open');
}

async function toggleMastered(id) {
  const w = words.find(x => x.id === id);
  if (!w) return;
  w.mastered = !w.mastered;
  closeModal();
  toast(w.mastered ? '✓ Marqué maîtrisé' : '↩ Remis à réviser');
  try {
    await apiMastered(id, w.mastered);
    renderTab();
  } catch(e) {
    w.mastered = !w.mastered; // rollback
    toast('Erreur de sync');
  }
}

function closeModal() {
  document.getElementById('modal-word').classList.remove('open');
}

// ─── FLASH ────────────────────────────────────────────────────────────────────
function resetFlash() {
  flashList = [...words.filter(w => !w.mastered)].sort(() => Math.random() - .5);
  if (flashList.length === 0) flashList = [...words].sort(() => Math.random() - .5);
  flashIdx = 0;
  flashRevealed = false;
}

function renderFlash() {
  if (words.length === 0) {
    document.getElementById('screen').innerHTML = `<div class="empty">Aucun mot à réviser.<br>Ajoute des mots d'abord !</div>`;
    return;
  }

  const w = flashList[flashIdx];
  if (!w) {
    document.getElementById('screen').innerHTML = `
      <div style="text-align:center;padding:40px 20px">
        <div style="font-size:40px;margin-bottom:16px">🎉</div>
        <div style="font-size:20px;font-weight:700;margin-bottom:8px">Session terminée !</div>
        <div style="color:var(--txt2);margin-bottom:24px">${flashList.length} mots révisés</div>
        <button class="btn btn-primary" onclick="resetFlash();renderFlash()">Recommencer</button>
      </div>`;
    return;
  }

  document.getElementById('screen').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div style="font-size:20px;font-weight:700">Révision</div>
      <div style="font-size:13px;color:var(--txt3)">${flashIdx + 1} / ${flashList.length}</div>
    </div>
    <div class="progress-bar" style="margin-bottom:20px"><div class="progress-fill" style="width:${(flashIdx/flashList.length)*100}%"></div></div>

    <div id="flash-card" onclick="revealFlash()">
      <div class="flash-word">${w.word}</div>
      <div class="flash-hint">${flashRevealed ? '' : 'Toucher pour révéler'}</div>
      ${flashRevealed && w.example ? `<div class="flash-answer">${w.example}</div>` : ''}
      ${flashRevealed ? `<div class="flash-hint" style="margin-top:8px">${w.category || ''}</div>` : ''}
    </div>

    ${flashRevealed ? `
      <div class="flash-actions">
        <button class="btn btn-danger" onclick="flashNext(false)">↩ À revoir</button>
        <button class="btn btn-success" onclick="flashNext(true)">✓ Je sais</button>
      </div>
    ` : `<button class="btn btn-ghost btn-full" onclick="flashNext(null)">Passer →</button>`}
  `;
}

function revealFlash() {
  if (!flashRevealed) { flashRevealed = true; renderFlash(); }
}

async function flashNext(knew) {
  const w = flashList[flashIdx];
  if (knew === true && !w.mastered) {
    w.mastered = true;
    apiMastered(w.id, true).catch(() => {});
  }
  flashIdx++;
  flashRevealed = false;
  renderFlash();
}

// ─── ADD ──────────────────────────────────────────────────────────────────────
function renderAdd() {
  const cats = [...new Set(words.map(w => w.category).filter(Boolean))].sort();
  document.getElementById('screen').innerHTML = `
    <div style="font-size:20px;font-weight:700;margin-bottom:20px">Ajouter un mot</div>

    <div class="field">
      <label>Mot ou expression en anglais *</label>
      <input type="text" id="add-word" placeholder="e.g. Outstanding issue" autofocus>
    </div>
    <div class="field">
      <label>Catégorie</label>
      <select id="add-cat">
        <option value="">Sans catégorie</option>
        ${cats.map(c => `<option value="${c}">${c}</option>`).join('')}
        <option value="Naval">Naval</option>
        <option value="Général">Général</option>
        <option value="Business">Business</option>
        <option value="Série/Film">Série/Film</option>
      </select>
    </div>
    <div class="field">
      <label>Exemple ou contexte</label>
      <textarea id="add-example" placeholder="Phrase d'exemple, contexte d'utilisation…"></textarea>
    </div>

    <button class="btn btn-primary btn-full" onclick="submitAdd()" id="add-btn">Ajouter dans Notion</button>

    <div style="margin-top:20px;padding-top:20px;border-top:1px solid var(--bord)">
      <div class="section-title" style="margin-bottom:12px">Analyser un texte</div>
      <textarea id="text-input" placeholder="Colle un texte (email, série, article…) pour extraire les expressions utiles" style="margin-bottom:10px"></textarea>
      <button class="btn btn-ghost btn-full" onclick="analyzeText()">🔍 Extraire les expressions</button>
      <div id="extract-result"></div>
    </div>
  `;
}

async function submitAdd() {
  const word = document.getElementById('add-word').value.trim();
  const category = document.getElementById('add-cat').value;
  const example = document.getElementById('add-example').value.trim();
  if (!word) { toast('Mot requis'); return; }

  const btn = document.getElementById('add-btn');
  btn.textContent = 'Envoi…';
  btn.disabled = true;

  try {
    const res = await apiAdd({word, category, example});
    if (res.success) {
      words.push(res.word);
      toast('✓ Ajouté dans Notion');
      renderAdd();
    } else {
      toast('Erreur : ' + (res.error || 'inconnue'));
      btn.textContent = 'Ajouter dans Notion';
      btn.disabled = false;
    }
  } catch(e) {
    toast('Erreur de connexion');
    btn.textContent = 'Ajouter dans Notion';
    btn.disabled = false;
  }
}

async function analyzeText() {
  const text = document.getElementById('text-input').value.trim();
  if (!text) { toast('Colle un texte d\'abord'); return; }

  document.getElementById('extract-result').innerHTML = `<div class="loader"><div class="spin"></div>Analyse en cours…</div>`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Extrait les 5 à 8 expressions anglaises les plus utiles à apprendre dans ce texte. Pour chacune, donne l'expression et une courte explication en français. Réponds UNIQUEMENT en JSON valide, format: [{"word":"expression","example":"explication courte en français"}]. Texte: "${text}"`
        }]
      })
    });
    const data = await res.json();
    const txt = data.content?.[0]?.text || '[]';
    const items = JSON.parse(txt.replace(/```json|```/g,'').trim());

    document.getElementById('extract-result').innerHTML = `
      <div style="margin-top:16px">
        <div class="section-title">Expressions extraites</div>
        ${items.map((item,i) => `
          <div style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--bord)">
            <div style="flex:1">
              <div style="font-weight:600">${item.word}</div>
              <div style="font-size:13px;color:var(--txt2)">${item.example}</div>
            </div>
            <button class="btn btn-success btn-sm" onclick="quickAdd('${item.word.replace(/'/g,"\\'")}','${item.example.replace(/'/g,"\\'")}')">+</button>
          </div>
        `).join('')}
      </div>
    `;
  } catch(e) {
    document.getElementById('extract-result').innerHTML = `<div class="empty">Erreur d'analyse</div>`;
  }
}

async function quickAdd(word, example) {
  try {
    const res = await apiAdd({word, example, category: 'Général'});
    if (res.success) { words.push(res.word); toast('✓ ' + word + ' ajouté'); }
    else toast('Erreur');
  } catch(e) { toast('Erreur de connexion'); }
}

// ─── STATS ────────────────────────────────────────────────────────────────────
function renderStats() {
  const total = words.length;
  const mastered = words.filter(w => w.mastered).length;
  const pct = total ? Math.round((mastered/total)*100) : 0;
  const cats = {};
  words.forEach(w => { const c = w.category||'Sans catégorie'; cats[c] = (cats[c]||0)+1; });

  document.getElementById('screen').innerHTML = `
    <div style="font-size:20px;font-weight:700;margin-bottom:20px">Progression</div>

    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px">
        <div>
          <div style="font-size:13px;color:var(--txt3)">Mots maîtrisés</div>
          <div style="font-size:32px;font-weight:700">${mastered} <span style="font-size:16px;color:var(--txt3)">/ ${total}</span></div>
        </div>
        <div style="font-size:28px;font-weight:700;color:var(--grn)">${pct}%</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>

    <div class="card">
      <div class="section-title">Par catégorie</div>
      ${Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([c,n]) => `
        <div class="stat-row">
          <span>${c}</span>
          <span class="stat-val" style="font-size:16px">${n}</span>
        </div>
      `).join('')}
    </div>

    <div style="margin-top:16px">
      <button class="btn btn-primary btn-full" onclick="switchTab('flash')">Lancer une révision →</button>
    </div>
  `;
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadWords();
</script>
</body>
</html>
